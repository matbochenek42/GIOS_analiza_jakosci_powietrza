name: GIOŚ Pipeline

on:
  schedule:
    - cron: '0 */9 * * *' # co 19 godzin (wg czasu UTC)
  workflow_dispatch:      # ręczne uruchomienie przyciskiem

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    # uprawnienia dla bota w repozytorium
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run ETL Script
      # polska strefy czasowa dla pipeline.py
      env:
        TZ: Europe/Warsaw
      run: python pliki_python/pipeline.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add dane/
        git commit -m "Automatyczna aktualizacja danych: $(date)" || exit 0
        git push